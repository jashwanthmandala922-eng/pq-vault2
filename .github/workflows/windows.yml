name: Windows Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install npm dependencies
        run: |
          cd windows
          npm ci

      - name: Build Windows (Debug)
        run: |
          cd windows
          npm run tauri build -- --debug

      - name: Build Windows (Release)
        run: |
          cd windows
          npm run tauri build

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-windows-installer
          path: windows/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-windows-msi
          path: windows/src-tauri/target/release/bundle/msi/*.msi

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd windows
          npm ci

      - name: Build web frontend
        run: |
          cd windows
          npm run build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-web
          path: windows/dist