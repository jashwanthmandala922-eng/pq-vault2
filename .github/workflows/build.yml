name: Build APK and EXE

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-android-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-android-release
          path: android/app/build/outputs/apk/release/*.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install npm dependencies
        run: |
          cd windows
          npm ci

      - name: Build Windows EXE
        run: |
          cd windows
          npm run tauri build

      - name: Upload Windows Installer (EXE)
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-windows-installer
          path: windows/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-windows-msi
          path: windows/src-tauri/target/release/bundle/msi/*.msi