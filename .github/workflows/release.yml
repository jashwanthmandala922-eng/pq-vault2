name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-all:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: pqvault-android-release
          path: releases/android

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: pqvault-windows-installer
          path: releases/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/android/*.apk
            releases/windows/*.exe
          generate_release_notes: |
            ## PQ Vault Release

            ### Features:
            - Post-quantum encryption (ML-KEM/ML-DSA)
            - OAuth login (Google/Apple)
            - Password generator
            - TOTP Authenticator
            - Passkey support
            - P2P Sync
            - Behavioral fingerprinting

            ### Downloads:
            - Android APK
            - Windows EXE

            ### Security:
            All data is stored locally with post-quantum encryption.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Gradle
        run: |
          cd /tmp
          curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: Build Release APK
        run: |
          cd android
          /tmp/gradle-8.7/bin/gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-android-release
          path: android/app/build/outputs/apk/release/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Build Windows
        run: |
          cd windows
          npm install
          npm run tauri build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-windows-installer
          path: windows/src-tauri/target/release/bundle/nsis/*.exe