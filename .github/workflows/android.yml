name: Android Build

on:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - 'securevault-core/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'android/**'
      - 'securevault-core/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle-actions/setup-gradle@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-android-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: pqvault-android-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Check APK size
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "Release APK size: $SIZE"
            # Verify size is >50MB
            SIZE_BYTES=$(stat -c%s "$APK_PATH")
            SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
            echo "Release APK size: ${SIZE_MB}MB"
            if [ $SIZE_MB -lt 50 ]; then
              echo "Warning: APK size is less than 50MB"
            fi
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle-actions/setup-gradle@v4

      - name: Run tests
        run: |
          cd android
          ./gradlew test --no-daemon